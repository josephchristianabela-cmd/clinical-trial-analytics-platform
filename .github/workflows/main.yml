name: Clinical Trial Platform Verification Engine

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
    - name: Check out Repository Codebase
      uses: actions/checkout@v4

    - name: Bootstrap R Architecture Environment
      uses: r-lib/actions/setup-r@v2
      with:
        use-public-rspm: true

    - name: Set up Pandoc Dependency Engine
      uses: r-lib/actions/setup-pandoc@v2

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

    - name: Install Required Analytics Packages
      run: |
        Rscript -e "install.packages(c('dplyr', 'gt', 'haven', 'survival', 'ggfortify', 'ggplot2', 'rmarkdown', 'shiny', 'shinydashboard', 'here', 'pharmaversesdtm', 'pharmaverseadam', 'renv', 'purrr', 'tidyr', 'lubridate', 'survminer'))"

    - name: Execute Data Ingestion (Download PHUSE Assets)
      # Phase 1: Extracts baseline SDTM & ADaM domains
      run: |
        Rscript scripts/01_data_ingestion.R

    - name: Execute TFL Generation Engine (Tables, Figures, Listings)
      # Phase 2: Creates demographic matrices and raw adverse event summaries
      run: |
        Rscript scripts/02_tfl_generation.R

    - name: Execute Regulatory Data Audit (Validation Logic)
      # Phase 3: Audits temporal chronology checks and cross-domain integrity
      run: |
        Rscript scripts/03_validation.R

    - name: Execute Time-To-Event Survival Engine
      # Phase 4: Models semi-parametric Cox PH models and exports KM curves
      run: |
        Rscript scripts/04_survival_analysis.R

    - name: Execute Automated Regulatory Document Compilation
      # Final Layer: Renders compiled regulatory notebook anchored to project root
      run: |
        Rscript -e "rmarkdown::render('reports/05_regulatory_review.Rmd', knit_root_dir = getwd(), output_dir = 'reports')"

    - name: Archive Regulatory Platform Artifacts
      # This saves all generated files so you can physically download them from GitHub!
      uses: actions/upload-artifact@v4
      with:
        name: regulatory-outputs
        path: |
          reports/05_regulatory_review.html
          reports/tfl_outputs/
          data/outputs/
