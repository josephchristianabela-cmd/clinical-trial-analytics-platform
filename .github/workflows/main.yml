name: Clinical Trial Platform Verification Engine

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
    - name: Check out Repository Codebase
      uses: actions/checkout@v4

    - name: Bootstrap R Architecture Environment
      uses: r-lib/actions/setup-r@v2
      with:
        use-public-rspm: true

    - name: Set up Pandoc Dependency Engine
      uses: r-lib/actions/setup-pandoc@v2

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

    - name: Install Required Analytics Packages
      run: |
        Rscript -e "install.packages(c('dplyr', 'gt', 'haven', 'survival', 'ggfortify', 'ggplot2', 'rmarkdown', 'shiny', 'shinydashboard', 'here'))"

    - name: Execute Data Ingestion (Download PHUSE Assets)
      # CRITICAL: This step creates the data files that the report needs!
      run: |
        Rscript scripts/01_data_ingestion.R

    - name: Execute Automated Regulatory Document Compilation
      # knit_root_dir = getwd() forces R to use the main project folder as the "Center of the Universe"
      run: |
        Rscript -e "rmarkdown::render('reports/05_regulatory_review.Rmd', knit_root_dir = getwd(), output_dir = 'reports')"
