name: Clinical Trial Platform Verification Engine

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
    - name: Check out Repository Codebase
      uses: actions/checkout@v4

    - name: Bootstrap R Architecture Environment
      uses: r-lib/actions/setup-r@v2
      with:
        use-public-rspm: true

    - name: Set up Pandoc Dependency Engine
      uses: r-lib/actions/setup-pandoc@v2

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

    - name: Setup pak for High-Speed Package Installation
      uses: r-lib/actions/setup-r-dependencies@v2
      with:
        packages: |
          any::dplyr
          any::gt
          any::haven
          any::survival
          any::ggfortify
          any::ggplot2
          any::rmarkdown
          any::shiny
          any::shinydashboard
          any::here
          any::pharmaversesdtm
          any::pharmaverseadam
          any::renv
          any::purrr
          any::tidyr
          any::lubridate
          any::survminer

    - name: Execute Data Ingestion (Download PHUSE Assets)
      run: |
        Rscript scripts/01_data_ingestion.R

    - name: Derive Traceable ADTTE (Time to First Dermatologic AE)
      run: |
        Rscript scripts/02_derive_adtte.R

    - name: Execute TFL Generation Engine (Tables, Figures, Listings)
      run: |
        Rscript scripts/03_tfl_generation.R

    - name: Execute Regulatory Data Audit (Validation Logic)
      run: |
        Rscript scripts/04_validation.R

    - name: Execute Time-To-Event Survival Engine
      run: |
        Rscript scripts/05_survival_analysis.R

    - name: Execute Automated Regulatory Document Compilation
      run: |
        Rscript -e "rmarkdown::render('reports/05_regulatory_review.Rmd', knit_root_dir = getwd(), output_dir = 'reports')"
        if [ -f "reports/validation_report.Rmd" ]; then
          Rscript -e "rmarkdown::render('reports/validation_report.Rmd', knit_root_dir = getwd(), output_dir = 'reports')"
        fi

    - name: Archive Regulatory Platform Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: regulatory-outputs
        if-no-files-found: ignore
        path: |
          reports/05_regulatory_review.html
          reports/validation_report.html
          reports/tfl_outputs/
          data/outputs/
